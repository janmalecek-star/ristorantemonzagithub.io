<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervace | Restaurace</title>
  <link rel="stylesheet" href="stylek.css">
</head>
<body>

  <header class="main-header">
    <h1 class="restaurant-logo">Ristorante Monza</h1>
    <p class="restaurant-tagline">Poctivá italská kuchyně v srdci Prahy</p>
  </header>

  <div class="menu-container">
    <div class="menu-item"><a href="o-nas.html">O nás</a></div>
    <div class="menu-item"><a href="menu.html">Menu</a></div>
    <div class="menu-item active"><a href="rezervace.html">Rezervace</a></div>
  </div>

  <div class="content-box">
    <h1>Rezervace stolu</h1>
    
    <form class="reservation-form" action="odeslani.php" method="post">
      
      <label for="jmeno">Jméno a příjmení:</label>
      <input type="text" id="jmeno" name="jmeno" required placeholder="Jan Novák">

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" required placeholder="jan.novak@email.cz">

      <label for="date">Datum a čas:</label>
      <input type="datetime-local" id="date" name="datum_cas" required>

      <label for="guests">Počet osob:</label>
      <input type="number" id="guests" name="pocet_osob" min="1" max="10" value="2" required>

      <label for="zona">Vyberte zónu:</label>
      <select id="zona" name="zona" required>
        <option value="">-- Vyberte místo --</option>
        <option value="hlavni-sala">Hlavní sál (Nekuřácký)</option>
        <option value="salonek">Salónek</option>
        <option value="zahradka">Letní zahrádka</option>
        <option value="u-baru">Stůl u baru</option>
      </select>

      <p style="margin: 10px 0 5px 0; font-weight: 600; color: #555;">Speciální požadavky:</p>
      <div class="checkbox-group">
        <input type="checkbox" id="zidlicka" name="pozadavky[]" value="Dětská židlička">
        <label for="zidlicka">Dětská židlička</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="okno" name="pozadavky[]" value="Stůl u okna">
        <label for="okno">Stůl u okna</label>
      </div>

      <label for="zprava">Poznámka / doplňující zpráva:</label>
      <textarea id="zprava" name="zprava" rows="4" placeholder="Máte nějaké potravinové alergie nebo speciální přání?"></textarea>

      <div class="form-buttons">
        <input class="prase btn-submit" type="submit" value="Odeslat rezervaci">
        <input class="prase btn-reset" type="reset" value="Vymazat">
      </div>

    </form>
  </div>

</body>
</html>
